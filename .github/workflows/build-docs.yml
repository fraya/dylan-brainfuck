name: build-docs

on:
  push:
    # all branches
    paths:
      - 'docs/**'
  pull_request:
    # all branches
    paths:
      - 'docs/**'

  # This enables the Run Workflow button on the Actions tab.
  workflow_dispatch:

# Set DYLAN environment variable to GITHUB_WORKSPACE so packages are
# installed in ../../_packages relative to documentation's Makefile
env:
  DYLAN: ${{ github.workspace }}

jobs:

  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v3

      - name: Install Open Dylan
        uses: dylan-lang/install-opendylan@v3
        with:
          version: 2023.1
          tag: v2023.1.0

      - name: Install sphinx-extensions dependencies
        run: |
          dylan update

      - name: Build docs
        uses: ammaraskar/sphinx-action@master
        with:
          docs-folder: "docs/"

      - name: deployment
        uses: sphinx-notes/pages@v3
